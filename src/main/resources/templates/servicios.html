<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago de Servicios | Financiera Confianza</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <link rel="stylesheet" th:href="@{/css/servicios.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-logo">
        <a th:href="@{/dashboard}"><img th:src="@{/img/logos/logo-financiera2.png}" alt="Financiera Confianza"></a>
    </div>
    <nav class="sidebar-nav">
        <a th:href="@{/dashboard}" class="nav-item"><i class="fas fa-home"></i> Posición Global</a>
        <a th:href="@{/transferencias}" class="nav-item"><i class="fas fa-exchange-alt"></i> Transferencias</a>
        <a th:href="@{/servicios}" class="nav-item active"><i class="fas fa-file-invoice-dollar"></i> Pago de Servicios</a>
        <a th:href="@{/tarjetas}" class="nav-item"><i class="fas fa-credit-card"></i> Tarjetas</a>
        <a th:href="@{/prestamos}" class="nav-item"><i class="fas fa-piggy-bank"></i> Mis Préstamos</a>
        <a th:href="@{/perfil}" class="nav-item"><i class="fas fa-user-cog"></i> Mi Perfil</a>
    </nav>
    <div class="sidebar-logout">
        <a th:href="@{/logout}" class="nav-item text-danger"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
    </div>
</aside>

<main class="main-content">
    <header class="topbar">
        <div class="welcome-text">
            <h2>Pago de Servicios</h2>
            <p>Paga tu luz, agua, internet y telefonía al instante</p>
        </div>
    </header>

    <div class="service-container">
        <div class="card service-card">
            <h3>Detalles del Recibo</h3>

            <div th:if="${error}" class="alert alert-error" style="margin-bottom: 20px;">
                <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
            </div>

            <div th:if="${exito}" class="alert alert-success" style="margin-bottom: 20px;">
                <i class="fas fa-check-circle"></i> <span th:text="${exito}"></span>
            </div>

            <form th:action="@{/servicios/pagar}" method="POST" class="service-form">

                <div class="form-group">
                    <label>Cuenta de Cargo</label>
                    <select class="form-control" name="cuentaOrigen" required>
                        <option value="ahorros">Cuenta Ahorro (S/ <span th:text="${#numbers.formatDecimal(usuario.saldo, 1, 'DEFAULT', 2, 'DEFAULT')}">0.00</span>)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Empresa o Servicio</label>
                    <select class="form-control" name="tipoServicio" required>
                        <option value="" disabled selected>Seleccione una empresa...</option>
                        <option value="Electrocentro">Electrocentro (Luz)</option>
                        <option value="Sedam Huancayo">Sedam Huancayo (Agua)</option>
                        <option value="Claro Peru">Claro (Móvil / Internet)</option>
                        <option value="Movistar Peru">Movistar (Móvil / Internet)</option>
                        <option value="Bitel">Bitel (Móvil)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Número de Suministro / Teléfono</label>
                    <input type="text" class="form-control" name="codigoSuministro" placeholder="Ej: 12345678" required>
                </div>

                <div class="form-group">
                    <label>Monto a Pagar (S/)</label>
                    <input type="number" class="form-control amount-input" name="monto" placeholder="0.00" step="0.01" min="1" required>
                </div>

                <button type="submit" class="btn-pagar"><i class="fas fa-check-circle"></i> Confirmar Pago</button>
            </form>
        </div>
    </div>
</main>

<script th:src="@{/js/servicios.js}"></script>
</body>
</html>
