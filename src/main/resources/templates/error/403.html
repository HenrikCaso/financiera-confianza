<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Acceso Restringido - Financiera Confianza</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/error-403.css}">
</head>
<body>
<div class="error-card">
    <i class="fas fa-shield-alt icon"></i>
    <h1>Acceso Denegado (403)</h1>
    <p>El sistema de seguridad ha bloqueado esta acción. Tu sesión actual no tiene los privilegios necesarios para ingresar a la plataforma administrativa o al core bancario.</p>
    <a th:href="@{/dashboard}" class="btn-back"><i class="fas fa-arrow-left"></i> Volver a mi cuenta</a>
</div>
</body>
</html>
