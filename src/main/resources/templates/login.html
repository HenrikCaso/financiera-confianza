<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banca por Internet | Financiera Confianza</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-body">

<div class="login-card">

    <div class="login-header">
        <a th:href="@{/}">
            <img th:src="@{/img/logos/logo-financiera2.png}" alt="Financiera Confianza" class="login-logo">
        </a>

        <h2 class="saludo">¡Hola!</h2>

        <form th:action="@{/login}" method="POST" class="login-form">

            <div class="input-group">
                <div class="select-wrapper">
                    <i class="fas fa-caret-down select-icon"></i>
                    <select name="tipoDoc" class="custom-select">
                        <option value="Seleccione su tipo de documento" selected>Seleccione su tipo de documento</option>
                        <option value="dni">DNI</option>
                        <option value="ce">Carné de Extranjería</option>
                        <option value="ptp">PTP/CPP</option>
                        <option value="refugio">Carné de Solicitante de Refugio</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <input type="text" name="numeroDoc" placeholder="Número de Documento" required>
            </div>

            <div class="input-group clave-group">
                <input type="password" name="clave" placeholder="Clave" required>
                <button type="button" class="btn-eye"><i class="far fa-eye"></i></button>
                <button type="submit" class="btn-submit"><i class="fas fa-location-arrow"></i></button>
            </div>
            <div style="margin-top: 25px; font-size: 13px;">
                ¿No tienes una Clave Web?
                <a th:href="@{/registro}" style="color: #00a4e4; font-weight: bold; text-decoration: none;">Regístrate aquí</a>
            </div>
        </form>
    </div>

    <div class="login-footer">
        <a href="#"><i class="fas fa-map-marker-alt"></i> Encuéntranos</a>
        <span class="divider">|</span>
        <a href="#"><i class="fas fa-phone-alt"></i> Contáctanos</a>
    </div>

</div>

</body>
</html>
