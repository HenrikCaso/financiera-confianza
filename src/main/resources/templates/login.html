<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banca por Internet | Financiera Confianza</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-body">

<div class="login-card">

    <div class="login-header">
        <a th:href="@{/}">
            <img th:src="@{/img/logos/logo-financiera2.png}" alt="Financiera Confianza" class="login-logo">
        </a>

        <h2 class="saludo">¡Hola!</h2>

        <div th:if="${error}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>
        <div th:if="${exito}" class="alert alert-success">
            <i class="fas fa-check-circle"></i> <span th:text="${exito}"></span>
        </div>

        <form th:action="@{/login}" method="POST" class="login-form">

            <div class="input-group">
                <div class="select-wrapper">
                    <i class="fas fa-caret-down select-icon"></i>
                    <select name="tipoDoc" class="custom-select" required>
                        <option value="" disabled selected>Seleccione su tipo de documento</option>
                        <option value="DNI">DNI</option>
                        <option value="CE">Carné de Extranjería</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <input type="text" name="numDoc" placeholder="Número de Documento" required>
            </div>

            <div class="input-group password-group">
                <input type="password" name="clave" id="claveInput" placeholder="Clave" required>
                <i class="fas fa-eye" id="togglePassword" title="Mostrar/Ocultar clave"></i>
                <button type="submit" class="btn-submit">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>

            <div style="margin-top: 25px; font-size: 13px;">
                ¿No tienes una Clave Web?
                <a th:href="@{/registro}" style="color: #63c5ff; font-weight: bold; text-decoration: none;">Regístrate aquí</a>
            </div>

        </form>
    </div>

    <div class="login-footer">
        <a href="#"><i class="fas fa-map-marker-alt"></i> Encuéntranos</a>
        <span class="divider">|</span>
        <a href="#"><i class="fas fa-phone-alt"></i> Contáctanos</a>
    </div>

</div>

<script th:src="@{/js/login.js}"></script>
</body>
</html>
