<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Portal Corporativo - Financiera Confianza</title>
    <link rel="stylesheet" th:href="@{/css/admin-login.css}">
</head>
<body>

<div class="login-container">
    <div class="login-box">
        <img th:src="@{/img/logos/logo-financiera.png}" alt="Financiera Confianza" class="logo-admin">
        <h2>Portal Colaboradores</h2>
        <p class="subtitle">Acceso exclusivo para personal del banco</p>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/admin/login}" method="POST">
            <div class="form-group">
                <label>DNI del Colaborador</label>
                <input type="text" name="numDoc" required>
            </div>
            <div class="form-group">
                <label>Contraseña Corporativa</label>
                <input type="password" name="clave" required>
            </div>
            <button type="submit" class="btn-admin-login">Ingresar al Core</button>
        </form>
    </div>
</div>

</body>
</html>
